server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # Docker's internal DNS — re-resolves upstreams dynamically
    resolver 127.0.0.11 valid=5s;

    # API Laravel
    location /api {
        root /var/www/backend/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/backend/public;
        set $upstream_app app;
        fastcgi_pass $upstream_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Evolution API (WhatsApp)
    location ~* ^/(manager|evolution|webhook) {
        set $upstream_evo evolution;
        proxy_pass http://$upstream_evo:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Arquivos do storage Laravel (PDFs, uploads)
    location /storage {
        root /var/www/backend/public;
        try_files $uri =404;
    }

    # Frontend Vite dev server com HMR
    location / {
        set $upstream_node node;
        proxy_pass http://$upstream_node:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
