name: aiprint

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/backend
      - /run/cups/cups.sock:/run/cups/cups.sock
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aiprint

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work redis --queue=impressao --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./backend:/var/www/backend
      - /run/cups/cups.sock:/run/cups/cups.sock
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiprint

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/backend:ro
    depends_on:
      - app
      - node
    networks:
      - aiprint

  node:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: sh -c "npm install --no-package-lock && npm run dev"
    networks:
      - aiprint

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aiprint
      MYSQL_USER: aiprint
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiprint

  evolution:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=aiprint-evolution-key
      - DATABASE_PROVIDER=mysql
      - DATABASE_CONNECTION_URI=mysql://aiprint:secret@mysql:3306/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evo
      - CACHE_REDIS_SAVE_INSTANCES=true
      - DEL_INSTANCE=false
      - LOG_LEVEL=ERROR
      - WA_VERSION_FETCH_ON_STARTUP=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - aiprint

  evolution-init:
    image: curlimages/curl:latest
    depends_on:
      evolution:
        condition: service_healthy
    command: >
      curl -s -X POST http://evolution:8080/instance/create
      -H "apikey: aiprint-evolution-key"
      -H "Content-Type: application/json"
      -d '{"instanceName":"aiprint","integration":"WHATSAPP-BAILEYS"}'
    networks:
      - aiprint
    restart: "no"

  redis:
    image: redis:7-alpine
    networks:
      - aiprint
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  aiprint:
    driver: bridge

volumes:
  node_modules:
  mysql_data:
  evolution_instances:
